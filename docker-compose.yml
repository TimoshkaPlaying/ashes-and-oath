services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      CLIENT_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8080}
    ports:
      - "${SERVER_BIND:-127.0.0.1}:${SERVER_PORT:-3001}:3001"
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_SERVER_URL: ""
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${CLIENT_BIND:-0.0.0.0}:${CLIENT_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/health || exit 1
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
