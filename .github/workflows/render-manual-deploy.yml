name: Manual Render deploy
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install official Render CLI
        shell: bash
        run: |
          curl -fsSL https://github.com/render-oss/cli/releases/download/v2.21.0/cli_2.21.0_linux_amd64.zip -o /tmp/render-cli.zip
          unzip -q /tmp/render-cli.zip -d /tmp/render-cli
          sudo install /tmp/render-cli/cli_v2.21.0 /usr/local/bin/render
          render --version
      - name: Authorize and deploy v1.2.0
        shell: bash
        run: |
          render login
          render deploys create srv-d99rsd6cjfls738patug --commit 3dad74013ab0faf984beaa8e837f43a9df0855ac --wait --confirm
      - name: Remove temporary workflow
        if: success()
        shell: bash
        run: |
          git rm .github/workflows/render-manual-deploy.yml
          git config user.name "Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove temporary Render deploy workflow"
          git push origin HEAD:main
